<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Organisasi</title>

    <style>
        :root{
            --dark-spruce: #364B36ff; 
            --orange: #FAAD1Aff;
        }

        body{
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        h2{
            text-align: center;
            margin: 40px 0;
            color: var(--dark-spruce);
        }

        .container{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            padding: 20px;
        }

        .card{
            background: white;
            width: 250px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-10px);
        }

        .card-header{
            background: var(--dark-spruce);
            height: 100px;
            position: relative;
        }

        .card-header::after{
            content: "";
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: var(--orange);
            border-radius: 50%;
            z-index: 1;
        }

        .card img{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            margin-top: -40px;
            border: 4px solid white;
        }

        .card-body{
            text-align: center;
            padding: 20px;
        }

        .card-body h3{
            margin: 10px 0 5px;
            color: var(--dark-spruce);
        }

        .card-body p{
            margin: 0;
            color: #777;
            font-size: 14px;
        }

        .card-footer{
            margin-top: 15px;
            padding: 10px;
            background: #fafafa;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .card-footer span{
            color: var(--orange);
            font-weight: bold;
        }

        @media (max-width: 600px){
            .card{
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <h2>Struktur Organisasi</h2>

    <div class="container">

        <!-- Ketua -->
        <div class="card">
            <div class="card-header"></div>
            <div class="card-body">
                <img src="https://via.placeholder.com/150" alt="">
                <h3>Reyfan</h3>
                <p>Ketua</p>
            </div>
            <div class="card-footer">
                <span>Leader</span>
            </div>
        </div>

        <!-- Wakil -->
        <div class="card">
            <div class="card-header"></div>
            <div class="card-body">
                <img src="https://via.placeholder.com/150" alt="">
                <h3>Andi</h3>
                <p>Wakil Ketua</p>
            </div>
            <div class="card-footer">
                <span>Support</span>
            </div>
        </div>

        <!-- Sekretaris -->
        <div class="card">
            <div class="card-header"></div>
            <div class="card-body">
                <img src="https://via.placeholder.com/150" alt="">
                <h3>Sinta</h3>
                <p>Sekretaris</p>
            </div>
            <div class="card-footer">
                <span>Admin</span>
            </div>
        </div>

        <!-- Bendahara -->
        <div class="card">
            <div class="card-header"></div>
            <div class="card-body">
                <img src="https://via.placeholder.com/150" alt="">
                <h3>Dika</h3>
                <p>Bendahara</p>
            </div>
            <div class="card-footer">
                <span>Finance</span>
            </div>
        </div>

    </div>

</body>
</html>
